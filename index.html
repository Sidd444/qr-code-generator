<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRify - Free QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>QRify</h1>
            <p class="subtitle">Instant Free QR Code Generator</p>
        </header>
        
        <div class="content">
            <input type="text" id="text" placeholder="Enter text, URL, WiFi password, UPI ID..." value="https://digitalheroesco.com">
            
            <select id="size">
                <option value="200">Small (200x200)</option>
                <option value="300" selected>Medium (300x300)</option>
                <option value="400">Large (400x400)</option>
            </select>
            
            <button onclick="generateQR()">Generate QR Code</button>
            
            <div class="qrcode" id="qrcode"></div>
            
            <button class="download-btn" onclick="downloadQR()" style="display:none;" id="downloadBtn">Download PNG</button>
            

        </div>
        
        <div class="footer">
            <p>Made for quick sharing</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
